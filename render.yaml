services:
  - type: web
    name: sap-o2c-explorer
    runtime: python
    buildCommand: |
      pip install -r backend/requirements.txt
      cd frontend && npm install && npm run build
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DB_PATH
        value: o2c.db
      - key: DATA_DIR
        value: sap-o2c-data
      - key: PYTHON_VERSION
        value: "3.11"
